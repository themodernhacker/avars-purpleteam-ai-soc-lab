server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info
  log_format: json

positions:
  filename: /tmp/positions.yaml
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push
    batch_size: 100000
    batch_wait: 10s
    max_retries: 5
    backoff_config:
      min_period: 100ms
      max_period: 10s

scrape_configs:
  # Azure Monitor / Sentinel logs
  - job_name: sentinel_logs
    azure_sd_configs:
      - cloud: AzurePublicCloud
        subscription_id: ${AZURE_SUBSCRIPTION_ID}
        tenant_id: ${AZURE_TENANT_ID}
    relabel_configs:
      - source_labels: [__meta_azure_resource_type]
        target_label: resource_type
      - source_labels: [__meta_azure_resource_name]
        target_label: resource
    pipeline_stages:
      - json:
          expressions:
            timestamp: TimeGenerated
            alert_name: AlertName
            severity: AlertSeverity
            source_ip: SourceIp
            user: TargetAccount
      - timestamp:
          format: RFC3339
          source: timestamp
      - labels:
          alert_name: alert
          severity: severity
          source_ip: source_ip
          user: user

  # Application logs from containers
  - job_name: docker_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    json_config:
      format: json
      time_format: RFC3339Nano
      time_key: time
    pipeline_stages:
      - multiline:
          line_start_pattern: '^\d{4}-\d{2}-\d{2}'
      - json:
          expressions:
            container: container_name
            service: attrs.service
  
  # Kubernetes logs (if on AKS)
  - job_name: kubernetes
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
    pipeline_stages:
      - cri: {}
      - multiline:
          line_start_pattern: '^\d{2}:\d{2}:\d{2}\.\d+Z'
      - json:
          expressions:
            level: level
            message: msg
      - labels:
          level: level
          pod: pod
          namespace: namespace

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+) (?P<host>\S+) (?P<process>\S+)(?:\[(?P<pid>\d+)\])?:(?P<message>.*)'
      - labels:
          process: process
          host: host

  # Security event logs
  - job_name: security_events
    static_configs:
      - targets:
          - localhost
        labels:
          job: security
          __path__: /var/log/audit/*.log
    pipeline_stages:
      - json:
          expressions:
            type: type
            timestamp: ts
            uid: uid
            gid: gid
            success: success
            syscall: syscall
      - labels:
          syscall_type: type
          uid: uid
          success: success

  # LSTM model inference logs
  - job_name: lstm_model
    static_configs:
      - targets:
          - localhost
        labels:
          job: lstm
          __path__: /logs/lstm_c2_detector/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event: event_type
            prediction: c2_probability
            confidence: confidence_score
            model_version: model_version
      - timestamp:
          format: RFC3339
          source: timestamp
      - labels:
          event_type: event
          model: lstm_c2_detector
      - metrics:
          c2_probability:
            type: gauge
            description: "C2 prediction confidence score"
            source: prediction
          inference_time_ms:
            type: histogram
            description: "LSTM inference latency"
            source: latency_ms

  # Application performance logs
  - job_name: app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: application
          __path__: /var/logs/app/*.log
    pipeline_stages:
      - multiline:
          line_start_pattern: '^\d{4}-\d{2}-\d{2}T'
      - json:
          expressions:
            level: level
            logger: logger
            message: msg
            trace_id: trace_id
            user_id: user_id
            response_time: response_ms
      - labels:
          level: level
          logger: logger
          trace_id: trace_id
      - metrics:
          request_duration_ms:
            type: histogram
            description: "Request latency distribution"
            source: response_time
      - tenant:
          source: trace_id

  # Network traffic logs
  - job_name: network_events
    static_configs:
      - targets:
          - localhost
        labels:
          job: network
          __path__: /var/log/network_monitor/*.log
    pipeline_stages:
      - json:
          expressions:
            src_ip: src_ip
            dst_ip: dst_ip
            src_port: src_port
            dst_port: dst_port
            protocol: protocol
            bytes_in: bytes_in
            bytes_out: bytes_out
            geoip_country: geoip_country
      - labels:
          src_ip: src_ip
          dst_ip: dst_ip
          protocol: protocol
          geoip_country: geoip_country
      - metrics:
          network_bytes_in:
            type: counter
            description: "Inbound traffic bytes"
            source: bytes_in
          network_bytes_out:
            type: counter
            description: "Outbound traffic bytes"
            source: bytes_out

  # Web application firewall (WAF) logs
  - job_name: waf_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: waf
          __path__: /var/log/waf/*.log
    pipeline_stages:
      - json:
          expressions:
            request_id: request_id
            timestamp: ts
            action: action
            rule_id: rule_id
            attack_type: attack_type
            client_ip: client_ip
            uri: uri
      - labels:
          attack_type: attack_type
          action: action
          client_ip: client_ip
      - metrics:
          waf_blocks:
            type: counter
            description: "WAF blocks count"
            match_all: true

# Tracing configuration (optional)
tracing:
  enabled: false

