# =============================================================================
# Kubernetes Namespace & Istio Injection Configuration
# Enables automatic sidecar injection for mTLS enforcement
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: honeypot
  labels:
    name: honeypot
    # Enable Istio sidecar injection for all pods in this namespace
    istio-injection: enabled
    # Pod security policy
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# =============================================================================
# Service Account for Honeypot Pods
# Principle: Least privilege
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: honeypot-sa
  namespace: honeypot

---
# =============================================================================
# OWASP Juice Shop - Vulnerable Web Application
# Purpose: Simulate vulnerable web service for attack demonstrations
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: honeypot
  labels:
    app: juice-shop
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: juice-shop

  template:
    metadata:
      name: juice-shop
      labels:
        app: juice-shop
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        # Sidecar injection annotations
        sidecar.istio.io/inject: "true"

    spec:
      serviceAccountName: honeypot-sa

      # Security context: Run as non-root, read-only filesystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: [4000]

      # Pod disruption budget (for high availability during updates)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - juice-shop
              topologyKey: kubernetes.io/hostname

      initContainers:
      # Initialize database
      - name: db-init
        image: bkimminich/juice-shop:latest
        command: ['sh', '-c']
        args: ['echo "Database initialization could go here"']
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

      containers:
      - name: juice-shop
        image: bkimminich/juice-shop:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "debug"  # Full logging for security testing

        # Resource limits: Prevent container escape via resource exhaustion
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Security context: Container-level restrictions
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Juice Shop needs write access
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
            # No additional capabilities granted
          seccompProfile:
            type: RuntimeDefault

        # Liveness probe: Restart if app crashes
        livenessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe: Traffic only to healthy pods
        readinessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Startup probe: Wait for app to start on slow nodes
        startupProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30  # 5 minutes total

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-logs
          mountPath: /logs

      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-logs
        emptyDir: {}

      # Pod scheduling
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# =============================================================================
# OWASP Juice Shop Service (ClusterIP)
# Internal Kubernetes service for pod discovery
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: juice-shop
  namespace: honeypot
  labels:
    app: juice-shop
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for direct pod access
  selector:
    app: juice-shop
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP

---
# =============================================================================
# OWASP Juice Shop Service (LoadBalancer for external access)
# In production, use Istio Ingress Gateway instead
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: juice-shop-lb
  namespace: honeypot
  labels:
    app: juice-shop
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "false"
spec:
  type: LoadBalancer
  selector:
    app: juice-shop
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
# =============================================================================
# SSH Honeypot Deployment
# Purpose: Simulate SSH service to attract & monitor attackers
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-honeypot
  namespace: honeypot
  labels:
    app: ssh-honeypot
    version: v1
spec:
  replicas: 2
  
  selector:
    matchLabels:
      app: ssh-honeypot

  template:
    metadata:
      labels:
        app: ssh-honeypot
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"

    spec:
      serviceAccountName: honeypot-sa

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: cowrie
        image: cowrie/cowrie:latest  # SSH/Telnet honeypot
        imagePullPolicy: Always

        ports:
        - name: ssh
          containerPort: 2222  # SSH port (2222 instead of 22 to avoid conflicts)
          protocol: TCP
        - name: telnet
          containerPort: 2323
          protocol: TCP

        env:
        - name: COWRIE_HOSTNAME
          value: "ubuntu-honeypot"
        - name: COWRIE_LISTEN_ENDPOINTS
          value: "tcp:2222:interface=0.0.0.0"

        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        livenessProbe:
          tcpSocket:
            port: ssh
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          tcpSocket:
            port: ssh
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2

        volumeMounts:
        - name: honeypot-logs
          mountPath: /home/cowrie/cowrie-git/var/log/cowrie

      volumes:
      - name: honeypot-logs
        emptyDir: {}

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst

---
# =============================================================================
# SSH Honeypot Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: ssh-honeypot
  namespace: honeypot
  labels:
    app: ssh-honeypot
spec:
  type: LoadBalancer
  selector:
    app: ssh-honeypot
  ports:
  - name: ssh
    port: 22
    targetPort: ssh
    protocol: TCP
  - name: telnet
    port: 23
    targetPort: telnet
    protocol: TCP

---
# =============================================================================
# Kali Linux Attack VM Pod
# Purpose: Run automated attacks from within the cluster
# WARNING: This is for authorized testing only!
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kali-attack
  namespace: honeypot
  labels:
    app: kali-attack
    version: v1
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kali-attack

  template:
    metadata:
      labels:
        app: kali-attack
        version: v1
      annotations:
        # Skip sidecar injection for attack pod (testing purposes)
        sidecar.istio.io/inject: "false"

    spec:
      serviceAccountName: honeypot-sa

      securityContext:
        runAsNonRoot: false  # Attack tools often need root
        runAsUser: 0
        fsGroup: 0

      containers:
      - name: kali
        image: kalilinux/kali-rolling:latest
        imagePullPolicy: Always

        command: ["sleep"]
        args: ["infinity"]

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        securityContext:
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            add:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_PTRACE

        volumeMounts:
        - name: attack-tools
          mountPath: /tools
        - name: results
          mountPath: /results

      volumes:
      - name: attack-tools
        emptyDir: {}
      - name: results
        emptyDir: {}

      terminationGracePeriodSeconds: 30

---
# =============================================================================
# Network Policy: Zero-Trust Pod Communication
# Only allow traffic between specific services
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honeypot-network-policy
  namespace: honeypot
spec:
  podSelector: {}  # Apply to all pods in namespace
  
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow traffic from monitoring/logging systems
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          app: prometheus

  # Allow Istio control plane communication
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 15000
    - protocol: TCP
      port: 15001
    - protocol: TCP
      port: 15006

  egress:
  # Deny egress by default (must explicitly allow)
  - to:
    - podSelector:
        matchLabels:
          app: juice-shop
    ports:
    - protocol: TCP
      port: 3000

  - to:
    - podSelector:
        matchLabels:
          app: ssh-honeypot
    ports:
    - protocol: TCP
      port: 2222

  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow internet access (for updates, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# =============================================================================
# Resource Quota: Limit resource consumption per namespace
# Prevents denial of service attacks via resource exhaustion
# =============================================================================

apiVersion: v1
kind: ResourceQuota
metadata:
  name: honeypot-quota
  namespace: honeypot
spec:
  hard:
    requests.cpu: "2000m"
    requests.memory: "2Gi"
    limits.cpu: "4000m"
    limits.memory: "4Gi"
    pods: "10"
    services.loadbalancers: "2"
  scopeSelector:
    matchExpressions:
    - operator: NotIn
      scopeName: PriorityClass
      values: ["system-critical"]
